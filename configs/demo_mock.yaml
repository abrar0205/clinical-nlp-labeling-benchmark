data_path: data/synthetic_demo_reports.csv
output_dir: experiments

llm:
  enabled: true
  mode: mock            # runs with no external model download
  model: Qwen/Qwen2.5-0.5B-Instruct
  fallback_to_mock: true
  max_new_tokens: 160

evaluation:
  pathologies:
    - pneumonia
    - pleural_effusion
    - pneumothorax
    - cardiomegaly
  confusion_pathology: pneumonia
