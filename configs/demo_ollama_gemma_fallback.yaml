data_path: data/synthetic_demo_reports.csv
output_dir: experiments

# Forgiving real-Gemma config. Tries a local Ollama server first; if it is not
# reachable it falls back to mock mode instead of failing. Results produced this
# way are labeled `llm_gemma_fallback_mock` so they are never mistaken for real
# Gemma output.
llm:
  enabled: true
  mode: ollama
  model: gemma3:1b      # or gemma3:4b
  endpoint: http://localhost:11434/api/generate
  fallback_to_mock: true

evaluation:
  pathologies:
    - pneumonia
    - pleural_effusion
    - pneumothorax
    - cardiomegaly
  confusion_pathology: pneumonia
